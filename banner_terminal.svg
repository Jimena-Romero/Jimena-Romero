<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1000" height="260" fill="#0D0D14"/>

  <!-- scanlines -->
  <g stroke="#6B4FCB" stroke-opacity="0.05">
    <line x1="0" y1="20" x2="1000" y2="20"/><line x1="0" y1="40" x2="1000" y2="40"/>
    <line x1="0" y1="60" x2="1000" y2="60"/><line x1="0" y1="80" x2="1000" y2="80"/>
    <line x1="0" y1="100" x2="1000" y2="100"/><line x1="0" y1="120" x2="1000" y2="120"/>
    <line x1="0" y1="140" x2="1000" y2="140"/><line x1="0" y1="160" x2="1000" y2="160"/>
    <line x1="0" y1="180" x2="1000" y2="180"/><line x1="0" y1="200" x2="1000" y2="200"/>
    <line x1="0" y1="220" x2="1000" y2="220"/><line x1="0" y1="240" x2="1000" y2="240"/>
  </g>

  <!-- terminal window chrome -->
  <rect x="30" y="30" width="940" height="200" rx="10" fill="#17172A" stroke="#6B4FCB" stroke-opacity="0.4"/>
  <circle cx="55" cy="52" r="6" fill="#FF5F56"/>
  <circle cx="75" cy="52" r="6" fill="#FFBD2E"/>
  <circle cx="95" cy="52" r="6" fill="#27C93F"/>
  <text x="500" y="57" class="mono" font-size="13" fill="#6B4FCB" text-anchor="middle">jimena@clic:~</text>
  <line x1="30" y1="70" x2="970" y2="70" stroke="#6B4FCB" stroke-opacity="0.3"/>

  <text x="55" y="105" class="mono" font-size="18" fill="#7CE38B">$ whoami</text>

  <text x="55" y="140" class="mono" font-size="24" fill="#FBF2C7" font-weight="700" opacity="0">
    jimena_romero
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.6s" fill="freeze"/>
  </text>

  <text x="55" y="172" class="mono" font-size="15" fill="#C9B6FF" opacity="0">
    &gt; fullstack developer / founder @clic
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1s" fill="freeze"/>
  </text>
  <text x="55" y="196" class="mono" font-size="15" fill="#C9B6FF" opacity="0">
    &gt; UTN FRVM · Villa María, Córdoba, AR
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/>
  </text>

  <rect x="55" y="205" width="11" height="18" fill="#7CE38B" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" dur="1s" begin="1.7s" repeatCount="indefinite"/>
  </rect>
</svg>
